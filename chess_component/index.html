<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: transparent; padding: 4px; font-family: sans-serif; }

    .board-wrap { display: inline-block; border: 3px solid #7a6045; }

    table.chess-board { border-collapse: collapse; display: block; }

    td.sq {
      width: 52px; height: 52px;
      text-align: center; vertical-align: middle;
      cursor: pointer; position: relative;
      font-size: 0; /* children handle size */
    }
    td.sq.light { background: #f0d9b5; }
    td.sq.dark  { background: #b58863; }

    /* State highlights — layered via box-shadow so colours compose */
    td.sq.last-from,
    td.sq.last-to   { background: #cdd26a !important; }
    td.sq.sf-from,
    td.sq.sf-to     { background: #f6b25a !important; }
    td.sq.selected  { background: #f6f624 !important; }

    /* Valid-destination dot */
    td.sq.dest::after {
      content: '';
      position: absolute;
      inset: 0; margin: auto;
      width: 34%; height: 34%;
      border-radius: 50%;
      background: rgba(0,0,0,0.25);
    }
    /* Capture ring */
    td.sq.dest-cap::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 0;
      border: 4px solid rgba(0,0,0,0.25);
    }

    .piece {
      display: inline-block;
      width: 44px; height: 44px;
      line-height: 44px;
      font-size: 36px;
      pointer-events: none;
      position: relative; z-index: 1;
      -webkit-user-select: none; user-select: none;
    }
    .piece.w { color: #fff; text-shadow: 0 0 2px #000, 0 0 3px #000, 0 1px 4px #000; }
    .piece.b { color: #1a1a1a; text-shadow: 0 0 2px #fff; }

    /* Coordinates */
    .coord-file {
      display: flex; width: 52px;
      justify-content: flex-end;
      padding-right: 3px;
      font-size: 11px; font-weight: 700;
      color: #7a6045; line-height: 14px;
    }
    .coord-rank {
      display: flex; height: 52px;
      align-items: flex-start;
      padding-top: 2px; padding-left: 3px;
      font-size: 11px; font-weight: 700;
      color: #7a6045;
    }
    .coord-rank.dark-sq  { color: #f0d9b5; }
    .coord-rank.light-sq { color: #b58863; }
    .coord-file.dark-sq  { color: #f0d9b5; }
    .coord-file.light-sq { color: #b58863; }

    .status-bar {
      margin-top: 6px;
      font-size: 12px;
      color: #555;
      min-height: 16px;
    }
  </style>
</head>
<body>
<div class="board-wrap">
  <table class="chess-board" id="board"><tbody id="tbody"></tbody></table>
</div>
<div class="status-bar" id="status"></div>

<script src="chess.min.js"></script>
<script>
// ── Streamlit protocol ────────────────────────────────────────────────────────
function post(type, extra) {
  window.parent.postMessage(Object.assign({ type: type }, extra || {}), '*');
}
function setVal(v)  { post('streamlit:setComponentValue', { value: v }); }
function setH()     { post('streamlit:setFrameHeight', { height: document.body.scrollHeight + 8 }); }

// ── Piece glyphs ──────────────────────────────────────────────────────────────
var GLYPH = {
  P:'♙', N:'♘', B:'♗', R:'♖', Q:'♕', K:'♔',
  p:'♟', n:'♞', b:'♝', r:'♜', q:'♛', k:'♚'
};

// ── State ─────────────────────────────────────────────────────────────────────
var game = null;
var sel  = null;   // selected square name e.g. "e2"
var args = {};

// ── Build board HTML ──────────────────────────────────────────────────────────
function render() {
  if (!game) return;

  var sfF = args.sf_from   || '';
  var sfT = args.sf_to     || '';
  var lF  = args.last_from || '';
  var lT  = args.last_to   || '';

  // Valid destinations from selected square
  var dests = {};
  if (sel) {
    game.moves({ square: sel, verbose: true }).forEach(function(m) {
      dests[m.to] = game.get(m.to) ? 'dest-cap' : 'dest';
    });
  }

  var html = '';
  for (var r = 0; r < 8; r++) {
    html += '<tr>';
    for (var c = 0; c < 8; c++) {
      var file = String.fromCharCode(97 + c);
      var rank = 8 - r;
      var sq   = file + rank;
      var isLight = (r + c) % 2 === 0;

      var cls = ['sq', isLight ? 'light' : 'dark'];
      if (sq === sel) cls.push('selected');
      else if (sq === lF || sq === lT) cls.push(sq === lF ? 'last-from' : 'last-to');
      if (sq === sfF) cls.push('sf-from');
      if (sq === sfT) cls.push('sf-to');
      if (dests[sq])  cls.push(dests[sq]);

      var p = game.get(sq);
      var inner = '';
      if (p) {
        var glyph = GLYPH[p.color === 'w' ? p.type.toUpperCase() : p.type];
        inner = '<span class="piece ' + p.color + '">' + glyph + '</span>';
      }

      // Rank coord on leftmost cell
      if (c === 0) {
        var coordCls = 'coord-rank ' + (isLight ? 'light-sq' : 'dark-sq');
        inner = '<span class="' + coordCls + '">' + rank + '</span>' + inner;
      }

      html += '<td class="' + cls.join(' ') + '" data-sq="' + sq + '">' + inner + '</td>';
    }
    html += '</tr>';
  }

  // File coords row
  html += '<tr>';
  for (var c2 = 0; c2 < 8; c2++) {
    var f2 = String.fromCharCode(97 + c2);
    var isLt = (7 + c2) % 2 === 0; // rank 1 = row index 7
    html += '<td style="height:16px;text-align:right;padding-right:3px;">'
          + '<span class="coord-file ' + (isLt ? 'light-sq' : 'dark-sq') + '">' + f2 + '</span>'
          + '</td>';
  }
  html += '</tr>';

  document.getElementById('tbody').innerHTML = html;

  // Click handlers
  document.querySelectorAll('td[data-sq]').forEach(function(td) {
    td.addEventListener('click', function() { onClick(this.dataset.sq); });
  });

  // Status
  var turn = game.turn() === 'w' ? 'White' : 'Black';
  var statusEl = document.getElementById('status');
  if (game.game_over()) {
    statusEl.textContent = 'Game over';
  } else if (sel) {
    statusEl.textContent = turn + ' — tap a highlighted square to move';
  } else {
    statusEl.textContent = turn + ' to move — tap a piece to select';
  }

  setH();
}

// ── Click / tap handler ───────────────────────────────────────────────────────
function onClick(sq) {
  if (!game || game.game_over()) return;

  if (sel) {
    // Attempt move
    var mv = game.move({ from: sel, to: sq, promotion: 'q' });
    if (mv) {
      sel = null;
      render();
      setVal(mv.from + mv.to + (mv.promotion || ''));
      return;
    }
    // Reselect own piece
    var p2 = game.get(sq);
    if (p2 && p2.color === game.turn()) {
      sel = sq;
    } else {
      sel = null;
    }
    render();
    return;
  }

  var p = game.get(sq);
  if (p && p.color === game.turn()) {
    sel = sq;
    render();
  }
}

// ── Streamlit render event ────────────────────────────────────────────────────
window.addEventListener('message', function(evt) {
  if (evt.data.type !== 'streamlit:render') return;
  var a = evt.data.args || {};
  var fenChanged = (!game || a.fen !== args.fen);
  args = a;
  if (fenChanged) {
    game = new Chess(a.fen);
    sel  = null;
  }
  render();
});

post('streamlit:componentReady', { apiVersion: 1 });
</script>
</body>
</html>
